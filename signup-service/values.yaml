# Signup Service Configuration

# Image configuration
image:
  registry: ghcr.io
  namespace: atxinvox
  name: signup-service
  tag: latest
  pullPolicy: Always
  pullPolicy: Always

# Secret for pulling images from private registry
imagePullSecrets:
  - name: ghcr-pull-secret

# Service configuration
service:
  ports:
    - name: http
      port: 80
      containerPort: 8000
      targetPort: http

# Health check configuration
probes:
  liveness:
    enabled: true
    path: /health
    initialDelaySeconds: 30
  readiness:
    enabled: true
    path: /health
    initialDelaySeconds: 5

# Environment configuration
envFrom:
  configMaps:
    - signup-config
  secrets:
    - signup-secrets
    - database-secret

# Resource configuration
resources:
  limits:
    cpu: 250m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 128Mi

# Autoscaling configuration
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

# Ingress configuration
ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
  hosts:
    - host: signup.atxinvox.com.au
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: signup-tls
      hosts:
        - signup.atxinvox.com.au

configMap:
  data:
    CENTRAL_SITE_URL: https://central.atxinvox.com.au
    DB_HOST: frappe-mariadb.mariadb.svc.cluster.local
    DB_NAME: _ed0da9a7_central_atxinvox_com_au
    DB_PORT: "3306"
    FRAPPE_SITE: central.atxinvox.com.au
    LOG_LEVEL: DEBUG
    REDIS_HOST: central-bench-test-redis-cache
    REDIS_PORT: "6379"
    DB_USER: _ed0da9a7_central_atxinvox_com_au
