# Auth Service Configuration

# Image configuration
image:
  registry: ghcr.io
  namespace: atxinvox
  name: auth-service
  tag: latest
  pullPolicy: Always
  pullPolicy: Always

# Secret for pulling images from private registry
imagePullSecrets:
  - name: ghcr-pull-secret

# Service configuration
service:
  ports:
    - name: http
      port: 80
      containerPort: 8000
      targetPort: http

# Health check configuration
probes:
  liveness:
    enabled: true
    path: /health
    initialDelaySeconds: 30
  readiness:
    enabled: true
    path: /health
    initialDelaySeconds: 5

# Environment configuration
envFrom:
  configMaps:
    - auth-config
  secrets:
    - auth-secrets
    - database-secret

# Volume configuration
volumes: []
volumeMounts: []

# Resource configuration
resources:
  limits:
    cpu: 250m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 128Mi

# Autoscaling configuration
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

# Ingress configuration
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: auth.atxinvox.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

configMap:
  data:
    CENTRAL_SITE_URL: http://central-bench-nginx.frappe.svc.cluster.local:8080
    DB_HOST: frappe-mariadb.mariadb.svc.cluster.local
    DB_NAME: _a8adf179_central_atxinvox_com_au
    DB_PORT: "3306"
    FRAPPE_SITE: central.atxinvox.com.au
    FRAPPE_SITES_PATH: /app/sites
    LOG_LEVEL: DEBUG
    REDIS_HOST: central-bench-redis-cache
    REDIS_PORT: "6379"